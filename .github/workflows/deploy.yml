name: Build and deploy site to gh-pages

# Builds the Astro site from `main` and syncs it to the root of `gh-pages`,
# preserving an allowlist of files managed by other workflows / scripts:
#   - appcast.xml             (Sparkle — load-bearing for installed apps)
#   - Aerial-*.md             (release notes — read by the build pipeline)
#   - thumbnails/             (expansions thumbnails)
#   - community/, community-2020/, community-2026/ (community pack assets)
#   - .nojekyll, .gitignore, CLAUDE.md
#
# Recursion guard: the deploy commit only touches Astro output at gh-pages
# root (index.html, _astro/, features/, sitemap-*.xml, …). None of those
# match the paths filter below, so the Action's own push can't retrigger it.

on:
  push:
    branches:
      - main
      - gh-pages
    # Triggered when source files change on `main` (rebuild needed) OR when
    # the release script touches appcast.xml / Aerial-*.md on gh-pages so
    # the homepage and release-notes index stay current.
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
      - 'appcast.xml'
      - 'Aerial-*.md'
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (Astro source)
        uses: actions/checkout@v4
        with:
          ref: main
          path: source

      - name: Checkout gh-pages (deploy target + appcast/release-notes)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: deploy

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Build Astro site
        working-directory: source
        env:
          # Astro reads the live appcast + release notes from the gh-pages
          # checkout instead of fetching over the network.
          APPCAST_PATH: ${{ github.workspace }}/deploy/appcast.xml
          RELEASE_NOTES_DIR: ${{ github.workspace }}/deploy
        run: npm run build

      - name: Sync build into gh-pages root (preserve allowlist)
        run: |
          set -euo pipefail
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.gitignore' \
            --exclude='.nojekyll' \
            --exclude='CLAUDE.md' \
            --exclude='appcast.xml' \
            --exclude='Aerial-*.md' \
            --exclude='thumbnails/' \
            --exclude='community/' \
            --exclude='community-2020/' \
            --exclude='community-2026/' \
            source/dist/ deploy/

      - name: Commit and push to gh-pages
        working-directory: deploy
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          MSG="Deploy site from ${GITHUB_SHA::7} (${GITHUB_EVENT_NAME})"
          git commit -m "$MSG"
          git push origin gh-pages
